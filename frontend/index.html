    imgEl.parentNode.insertBefore(wrapper, imgEl);
    wrapper.appendChild(imgEl);

    const scaleX = imgEl.clientWidth / imgEl.naturalWidth;

    lastDetections.forEach(d => {

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>GeoQuery</title>

<style>

*{
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f5f5f5;
    max-width:900px;
    margin:20px auto;
    padding:0 12px;
}

h1{
    text-align:center;
}

#upload-zone{
    border:2px dashed #888;
    border-radius:8px;
    background:white;
    padding:30px;
    text-align:center;
    cursor:pointer;
    margin-bottom:15px;
}

#upload-zone.dragover{
    background:#e3f1ff;
}

#image-display{
    text-align:center;
    margin-bottom:15px;
}

#image-display img{
    max-width:100%;
    border-radius:8px;
}

#chat-window{
    background:white;
    border:1px solid #ddd;
    border-radius:8px;
    padding:15px;
    height:360px;
    overflow-y:auto;
    margin-bottom:12px;
}

.msg{
    margin:8px 0;
    padding:8px 12px;
    border-radius:12px;
    max-width:80%;
    white-space:pre-wrap;
    word-wrap:break-word;
}

.msg.user{
    background:#d1e7ff;
    margin-left:auto;
    text-align:right;
}

.msg.assistant{
    background:#eeeeee;
    margin-right:auto;
}

#error-box{
    color:red;
    min-height:22px;
    text-align:center;
    margin-bottom:10px;
}

#input-row{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

#question-input{
    flex:1;
    min-width:150px;
    padding:10px;
    border-radius:6px;
    border:1px solid #cccccc;
}

button{
    padding:10px 16px;
    border:none;
    border-radius:6px;
    background:#007bff;
    color:white;
    cursor:pointer;
}

button:disabled{
    background:#999;
    cursor:not-allowed;
}

.spinner{
    display:inline-block;
    width:14px;
    height:14px;
    border:2px solid #cccccc;
    border-top:2px solid #007bff;
    border-radius:50%;
    animation:spin .8s linear infinite;
    margin-right:6px;
    vertical-align:middle;
}

@keyframes spin{

to{
transform:rotate(360deg);
}

}

@media(max-width:480px){

#chat-window{
height:280px;
}

.msg{
max-width:92%;
}

}

</style>

</head>

<body>

<h1>GeoQuery</h1>

<div id="error-box"></div>

<div id="upload-zone">

Drag & Drop an image here or click to upload
<br><br>

<input
type="file"
id="file-input"
accept=".jpg,.jpeg,.png"
style="display:none"
>

<button
id="export-btn"
style="margin-top:10px;background:#28a745;"
>
Download PDF Report
</button>

</div>

<div id="image-display"></div>

<div id="chat-window"></div>

<div id="input-row">

<input
type="text"
id="question-input"
placeholder="Ask about the uploaded image..."
disabled
>

<button
id="send-btn"
disabled
>
Send
</button>

</div>

<script>

const API_BASE="http://localhost:8000";

const SESSION_ID="session_"+Date.now();

const uploadZone=document.getElementById("upload-zone");
const fileInput=document.getElementById("file-input");
const imageDisplay=document.getElementById("image-display");
const chatWindow=document.getElementById("chat-window");
const questionInput=document.getElementById("question-input");
const sendBtn=document.getElementById("send-btn");
const exportBtn=document.getElementById("export-btn");
const errorBox=document.getElementById("error-box");

let lastDetections=[];

function showError(message){

errorBox.textContent=message;

setTimeout(()=>{

errorBox.textContent="";

},5000);

}

function addMessage(role,text){

const div=document.createElement("div");

div.className="msg "+role;

div.textContent=text;

chatWindow.appendChild(div);

chatWindow.scrollTop=chatWindow.scrollHeight;

}

uploadZone.addEventListener("click",()=>{

fileInput.click();

});

uploadZone.addEventListener("dragover",(e)=>{

e.preventDefault();

uploadZone.classList.add("dragover");

});

uploadZone.addEventListener("dragleave",()=>{

uploadZone.classList.remove("dragover");

});

uploadZone.addEventListener("drop",(e)=>{

e.preventDefault();

uploadZone.classList.remove("dragover");

if(e.dataTransfer.files.length){

handleUpload(e.dataTransfer.files[0]);

}

});

fileInput.addEventListener("change",()=>{

if(fileInput.files.length){

handleUpload(fileInput.files[0]);

}

});

function renderClickOverlay(){

const img=imageDisplay.querySelector("img");

if(!img)return;

const createOverlay=()=>{

const old=imageDisplay.querySelector(".overlay-wrapper");

if(old){
old.remove();
}

const wrapper=document.createElement("div");

wrapper.className="overlay-wrapper";

wrapper.style.position="relative";
wrapper.style.display="inline-block";

img.parentNode.insertBefore(wrapper,img);

wrapper.appendChild(img);

const scaleX=img.clientWidth/img.naturalWidth;
const scaleY=img.clientHeight/img.naturalHeight;

lastDetections.forEach(det=>{

const [x1,y1,x2,y2]=det.bbox;

const box=document.createElement("div");

box.style.position="absolute";
box.style.left=`${x1*scaleX}px`;
box.style.top=`${y1*scaleY}px`;
box.style.width=`${(x2-x1)*scaleX}px`;
box.style.height=`${(y2-y1)*scaleY}px`;
box.style.cursor="pointer";
box.style.background="rgba(255,255,255,0)";
box.title=`Click for ${det.class} information`;

box.addEventListener("click",()=>{

fetchObjectDescription(det.id);

});

wrapper.appendChild(box);

});

};

if(img.complete){

createOverlay();

}else{

img.onload=createOverlay;

}

}

async function fetchObjectDescription(objectId){

const formData=new FormData();

formData.append("object_id",objectId);

formData.append("session_id",SESSION_ID);

try{

const res=await fetch(
`${API_BASE}/object_query`,
{
method:"POST",
body:formData
}
);

const data=await res.json();

if(!res.ok){

showError(data.detail||"Failed to fetch object details.");

return;

}

addMessage("assistant",data.text);

}

catch(err){

showError("Unable to contact backend.");

}

}

async function handleUpload(file){

errorBox.textContent="";

if(
!(
file.type==="image/jpeg"||
file.type==="image/png"
)
){

showError("Please upload a JPG or PNG image.");

return;

}

const imgCheck=new Image();

const imageURL=URL.createObjectURL(file);

const dimensionOK=await new Promise(resolve=>{

imgCheck.onload=()=>{

resolve(
imgCheck.width<=1024&&
imgCheck.height<=1024
);

URL.revokeObjectURL(imageURL);

};

imgCheck.src=imageURL;

});

if(!dimensionOK){

showError("Maximum supported image resolution is 1024×1024.");

return;

}

const formData=new FormData();

formData.append("file",file);

formData.append("session_id",SESSION_ID);

questionInput.disabled=true;
sendBtn.disabled=true;

const loading=document.createElement("div");

loading.className="msg assistant";

loading.innerHTML=`<span class="spinner"></span>Analyzing image...`;

chatWindow.appendChild(loading);

chatWindow.scrollTop=chatWindow.scrollHeight;

try{

const res=await fetch(
`${API_BASE}/upload`,
{
method:"POST",
body:formData
}
);

const data=await res.json();

if(chatWindow.contains(loading))
chatWindow.removeChild(loading);

if(!res.ok){

showError(data.detail||"Upload failed.");

return;

}

imageDisplay.innerHTML=
`<img src="data:image/png;base64,${data.annotated_image}">`;

lastDetections=data.detections_full||[];

renderClickOverlay();

addMessage(
"assistant",
`Caption: ${data.caption}`
);

if(data.detections.length){

const text=data.detections.map(d=>

`${d.class} | ${(d.confidence*100).toFixed(0)}% | ${d.size}, ${d.color}`

).join("\n");

addMessage(
"assistant",
`Detected objects:\n${text}`
);

}else{

addMessage(
"assistant",
"No supported objects detected."
);

}

questionInput.disabled=false;
sendBtn.disabled=false;

}

catch(err){

if(chatWindow.contains(loading))
chatWindow.removeChild(loading);

showError(
"Could not connect to backend."
);

}

    questionInput.disabled = false;
    sendBtn.disabled = false;
}

async function sendQuestion() {

    const question = questionInput.value.trim();

    if (!question) {
        showError("Question cannot be empty.");
        return;
    }

    addMessage("user", question);

    questionInput.value = "";

    questionInput.disabled = true;
    sendBtn.disabled = true;

    const loading = document.createElement("div");

    loading.className = "msg assistant";

    loading.innerHTML =
        `<span class="spinner"></span>Thinking...`;

    chatWindow.appendChild(loading);

    chatWindow.scrollTop = chatWindow.scrollHeight;

    const formData = new FormData();

    formData.append("question", question);
    formData.append("session_id", SESSION_ID);

    try {

        const res = await fetch(
            `${API_BASE}/query`,
            {
                method: "POST",
                body: formData
            }
        );

        const data = await res.json();

        if (chatWindow.contains(loading))
            chatWindow.removeChild(loading);

        if (!res.ok) {

            showError(data.detail || "Query failed.");

            questionInput.disabled = false;
            sendBtn.disabled = false;

            return;

        }

        addMessage("assistant", data.text);

        if (data.annotated_image) {

            imageDisplay.innerHTML =
                `<img src="data:image/png;base64,${data.annotated_image}">`;

            if (data.detections_full)
                lastDetections = data.detections_full;
            else if (data.detections)
                lastDetections = data.detections;

            renderClickOverlay();

        }

    }

    catch (err) {

        if (chatWindow.contains(loading))
            chatWindow.removeChild(loading);

        showError("Could not connect to backend.");

    }

    questionInput.disabled = false;
    sendBtn.disabled = false;

}

exportBtn.addEventListener("click", () => {

    window.open(
        `${API_BASE}/export_report?session_id=${SESSION_ID}`,
        "_blank"
    );

});

sendBtn.addEventListener(
    "click",
    sendQuestion
);

questionInput.addEventListener(
    "keypress",
    (e) => {

        if (e.key === "Enter")
            sendQuestion();

    }
);

</script>
